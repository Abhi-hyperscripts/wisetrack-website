  <!-- WISETRACK curved along top arch position -->
  <text class="ring ring--top">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">WISETRACK</textPath>
  </text>

  <!-- TECHNOLOGIES curved along bottom arch position -->
  <text class="ring ring--bot">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">TECHNOLOGIES</textPath>
  </text>

  <!-- WT monogram, using the extracted custom mark.
       Source viewBox 228x151; rendered here 1000 wide x 662 tall,
       centred at (881, 761). -->
  <image href="wt-mark.svg" x="381" y="430" width="1000" height="662"/>
</svg>
