<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1402" role="img" aria-label="Wisetrack Technologies">
  <!--
    Wisetrack mark with curved wordmark on top and bottom arches.
    Uses the braces-only frame PNG; WISETRACK and TECHNOLOGIES render
    as curved text in place of the original arches.

    Single CSS variable for theming:
      logo-ink   colour of the entire mark (default off-white)
  -->
  <style>
    @font-face {
      font-family: "Corpta";
      src: url("../fonts/corpta-demo.otf") format("opentype");
      font-display: swap;
    }
    svg { --logo-ink: #EAEAF5; }
    .wt {
      font-family: "Corpta", "Inter Tight", system-ui, sans-serif;
      font-size: 720px;
      fill: var(--logo-ink);
      letter-spacing: -0.04em;
    }
    .ring {
      font-family: "Corpta", "Inter Tight", system-ui, sans-serif;
      fill: var(--logo-ink);
    }
    .ring--top { font-size: 100px; letter-spacing: 0.10em; }
    .ring--bot { font-size: 100px; letter-spacing: 0.04em; }
  </style>

  <defs>

    <!-- Top arc path: wider chord, longer arc length so the wordmark fits.
         Sweep=1 (clockwise) so text reads L to R with letters extending up. -->
    <path id="arcTop" d="M 420,215 A 1100,1100 0 0,1 1372,215"/>

    <!-- Bottom arc path: mirror of top. Sweep=0 (CCW) so text reads L to R.
         Chord at y=1257 places the text body at y=1187..1365 — mirror of the
         top text body at y=37..215 about the viewBox centre. -->
    <path id="arcBot" d="M 420,1257 A 1100,1100 0 0,0 1372,1257"/>
  </defs>

  <!-- Braces frame, recoloured via the CSS variable -->
  <g transform="translate(0,1402) scale(0.1,-0.1)" fill="var(--logo-ink)" stroke="none">
    <path d="M3325 12019 c-981 -48 -1624 -427 -1845 -1086 -70 -210 -96 -423 -87
