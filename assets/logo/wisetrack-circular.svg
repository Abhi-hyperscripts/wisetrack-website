<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1402" role="img" aria-label="Wisetrack Technologies">
  <!--
    Wisetrack mark. Uses the Hyperscripts brace + arc frame (sourced from
    wisetrack-frame.png with the HS region already cleared) and overlays
    a "WT" monogram set in Corpta in the centre.

    Single CSS variable for theming:
      logo-ink   colour of the entire mark (default off-white for dark themes)
                 Override with #000 for light themes.
  -->
  <style>
    @font-face {
      font-family: "Corpta";
      src: url("../fonts/corpta-demo.otf") format("opentype");
      font-display: swap;
    }
    svg { --logo-ink: #EAEAF5; }
    .wt {
      font-family: "Corpta", "Inter Tight", system-ui, sans-serif;
      font-size: 720px;
      fill: var(--logo-ink);
      letter-spacing: -0.04em;
    }
  </style>

  <defs>
    <!-- Recolour the black-on-transparent frame PNG via the CSS variable.
         feFlood creates a layer of the ink colour; feComposite "in" keeps it
         only where the source had alpha, so the silhouette adopts the new colour. -->
  </defs>

